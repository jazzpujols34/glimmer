<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9f0"/>
      <stop offset="100%" stop-color="#fdf0e0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Scattered confetti dots -->
  <g opacity="0.5">
    <circle cx="150" cy="100" r="8" fill="#f4a261"/>
    <circle cx="380" cy="180" r="6" fill="#e76f51"/>
    <circle cx="600" cy="80" r="10" fill="#2a9d8f"/>
    <circle cx="850" cy="150" r="7" fill="#e9c46a"/>
    <circle cx="1100" cy="90" r="9" fill="#f4a261"/>
    <circle cx="1350" cy="170" r="6" fill="#264653"/>
    <circle cx="1580" cy="110" r="8" fill="#e76f51"/>
    <circle cx="1780" cy="190" r="7" fill="#2a9d8f"/>
    <!-- Mid scattered -->
    <circle cx="100" cy="500" r="5" fill="#e9c46a" opacity="0.3"/>
    <circle cx="1820" cy="550" r="6" fill="#f4a261" opacity="0.3"/>
    <!-- Bottom confetti -->
    <circle cx="200" cy="900" r="9" fill="#2a9d8f"/>
    <circle cx="450" cy="950" r="6" fill="#e9c46a"/>
    <circle cx="700" cy="1000" r="8" fill="#e76f51"/>
    <circle cx="1200" cy="920" r="7" fill="#264653"/>
    <circle cx="1500" cy="980" r="10" fill="#f4a261"/>
    <circle cx="1720" cy="930" r="6" fill="#2a9d8f"/>
  </g>
  <!-- Tiny confetti rectangles -->
  <g opacity="0.35">
    <rect x="280" y="130" width="12" height="5" rx="2" fill="#e76f51" transform="rotate(30 286 133)"/>
    <rect x="950" y="100" width="10" height="4" rx="2" fill="#2a9d8f" transform="rotate(-20 955 102)"/>
    <rect x="1450" y="140" width="14" height="5" rx="2" fill="#e9c46a" transform="rotate(45 1457 143)"/>
    <rect x="350" y="960" width="12" height="5" rx="2" fill="#264653" transform="rotate(-30 356 963)"/>
    <rect x="1600" y="950" width="10" height="4" rx="2" fill="#e76f51" transform="rotate(15 1605 952)"/>
  </g>
</svg>

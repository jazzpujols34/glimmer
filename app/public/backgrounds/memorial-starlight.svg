  <circle cx="1400" cy="220" r="2.5" fill="url(#star)" opacity="0.5"/>
  <circle cx="1650" cy="180" r="3.5" fill="url(#star)" opacity="0.7"/>
  <circle cx="300" cy="400" r="2" fill="url(#star)" opacity="0.4"/>
  <circle cx="850" cy="500" r="2.5" fill="url(#star)" opacity="0.3"/>
  <circle cx="1500" cy="450" r="2" fill="url(#star)" opacity="0.4"/>
  <circle cx="1750" cy="600" r="3" fill="url(#star)" opacity="0.35"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a2e"/>
      <stop offset="30%" stop-color="#3a1a30"/>
      <stop offset="60%" stop-color="#4a2a28"/>
      <stop offset="100%" stop-color="#3a2018"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Warm horizon glow -->
  <ellipse cx="960" cy="750" rx="900" ry="300" fill="#6a3030" opacity="0.15"/>
  <ellipse cx="960" cy="800" rx="600" ry="180" fill="#8a4030" opacity="0.1"/>
  <!-- Subtle horizon line -->
  <line x1="0" y1="750" x2="1920" y2="750" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
</svg>
